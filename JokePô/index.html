<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>JokePô</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="container">
    
        <h1>JokePô</h1>

    <div class="buttons">

        <button id="Rock" onclick="playHuman('Rock')">&#x270A;</button>

        <button id="Paper" onclick="playHuman('Paper')">&#x270B;</button>

        <button id="Scissors" onclick="playHuman('Scissors')">&#x270C;</button>

    </div>

    <p class="result"></p>


        <p class="your-score">Sua pontuação: <span  id="human-score">0</span></p>
        
        <p class="alexa-score">Pontuação da Alexa: <span  id="machine-score">0</span></p>


    

    </div>
    
</body>

<script src="script.js"></script> 
</html>
